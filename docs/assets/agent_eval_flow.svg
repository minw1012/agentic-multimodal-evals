<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1040" viewBox="0 0 1800 1040" role="img" aria-labelledby="title desc">
  <title id="title">Agent-Based Evaluation System for LLM Outputs</title>
  <desc id="desc">Full agentic multimodal evaluation architecture with input cases, orchestration, evidence extraction, scoring, result storage, and continuous improvement.</desc>
  <defs>
    <style>
      .bg{fill:#f8fbff}.title{font:700 42px Arial,Helvetica,sans-serif;fill:#0f172a}.subtitle{font:18px Arial,Helvetica,sans-serif;fill:#475569}
      .lane{fill:white;stroke:#93c5fd;stroke-width:2;rx:16}.lane-green{fill:white;stroke:#86efac;stroke-width:2;rx:16}
      .head{fill:#2563eb}.head-green{fill:#16a34a}.head-purple{fill:#6d28d9}
      .head-text{font:700 24px Arial,Helvetica,sans-serif;fill:white}
      .card{fill:#ffffff;stroke:#bfdbfe;stroke-width:1.6;rx:12}.card-green{fill:#ffffff;stroke:#86efac;stroke-width:1.6;rx:12}.card-purple{fill:#ffffff;stroke:#c4b5fd;stroke-width:1.6;rx:12}
      .card-title{font:700 18px Arial,Helvetica,sans-serif;fill:#111827}.card-text{font:15px Arial,Helvetica,sans-serif;fill:#334155}.small{font:13px Arial,Helvetica,sans-serif;fill:#475569}
      .icon{font:700 22px Arial,Helvetica,sans-serif;fill:#2563eb}.icon-green{font:700 22px Arial,Helvetica,sans-serif;fill:#16a34a}.icon-purple{font:700 22px Arial,Helvetica,sans-serif;fill:#6d28d9}
      .arrow{stroke:#2563eb;stroke-width:5;fill:none;marker-end:url(#blueArrow)}.arrow-green{stroke:#16a34a;stroke-width:5;fill:none;marker-end:url(#greenArrow)}
      .loop{stroke:#6d28d9;stroke-width:3;fill:none;stroke-dasharray:10 8;marker-end:url(#purpleArrow)}
      .note{fill:#fff7ed;stroke:#fdba74;stroke-width:1.6;rx:14}.note-title{font:700 20px Arial,Helvetica,sans-serif;fill:#9a3412}.note-text{font:16px Arial,Helvetica,sans-serif;fill:#9a3412}
    </style>
    <marker id="blueArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/></marker>
    <marker id="greenArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#16a34a"/></marker>
    <marker id="purpleArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#6d28d9"/></marker>
  </defs>

  <rect width="1800" height="1040" class="bg"/>
  <text x="900" y="54" text-anchor="middle" class="title">Agent-Based Evaluation System for LLM Outputs</text>
  <text x="900" y="86" text-anchor="middle" class="subtitle">Multimodal / agentic evals: extract evidence first, then score with a rubric.</text>

  <g transform="translate(34 126)">
    <rect width="270" height="575" class="lane"/>
    <rect width="270" height="54" rx="16" class="head"/>
    <text x="135" y="36" text-anchor="middle" class="head-text">1. Input / Eval Case</text>
    <rect x="18" y="84" width="234" height="92" class="card"/><text x="36" y="122" class="icon">PROMPT</text><text x="36" y="150" class="card-text">User prompt / task</text>
    <rect x="18" y="204" width="234" height="126" class="card"/><text x="36" y="244" class="icon">OUTPUT</text><text x="36" y="272" class="card-text">App / model output</text><text x="36" y="298" class="small">Text / Image / Audio / Video</text>
    <rect x="18" y="358" width="234" height="112" class="card"/><text x="36" y="397" class="icon">META</text><text x="36" y="425" class="card-text">app version / model version</text><text x="36" y="450" class="small">device / latency / prompt version</text>
    <text x="135" y="520" text-anchor="middle" class="small">Golden / Regression /</text><text x="135" y="542" text-anchor="middle" class="small">Adversarial / Production Sample</text>
  </g>

  <g transform="translate(350 126)">
    <rect width="305" height="575" class="lane"/>
    <rect width="305" height="54" rx="16" class="head"/>
    <text x="152" y="36" text-anchor="middle" class="head-text">2. Eval Agent Orchestration</text>
    <rect x="22" y="80" width="261" height="85" class="card"/><text x="42" y="114" class="icon">INTENT</text><text x="42" y="142" class="card-text">Parse explicit constraints</text><text x="42" y="162" class="small">+ implicit expectations</text>
    <rect x="22" y="190" width="261" height="94" class="card"/><text x="42" y="224" class="icon">RUBRIC</text><text x="42" y="252" class="card-text">Generate hard constraints</text><text x="42" y="272" class="small">+ soft scores + templates</text>
    <rect x="46" y="294" width="213" height="34" class="card-purple"/><text x="62" y="317" class="icon-purple">HUMAN-APPROVED TEMPLATE</text>
    <rect x="22" y="348" width="261" height="85" class="card"/><text x="42" y="382" class="icon">TOOLS</text><text x="42" y="410" class="card-text">Decide which tools to call</text>
    <rect x="22" y="458" width="261" height="85" class="card"/><text x="42" y="492" class="icon">EXEC</text><text x="42" y="520" class="card-text">Schedule tools + aggregate</text>
  </g>

  <g transform="translate(704 126)">
    <rect width="420" height="575" class="lane"/>
    <rect width="420" height="54" rx="16" class="head"/>
    <text x="210" y="36" text-anchor="middle" class="head-text">3. Evidence Extraction</text>
    <rect x="92" y="68" width="236" height="36" class="card-purple"/><text x="122" y="92" class="icon-purple">Trainable / Replaceable Tools</text>
    <rect x="20" y="124" width="180" height="84" class="card"/><text x="38" y="158" class="icon">TEXT</text><text x="92" y="151" class="card-title">Text Analyzer</text><text x="92" y="176" class="small">Correctness / format</text>
    <rect x="220" y="124" width="180" height="84" class="card"/><text x="238" y="158" class="icon">OCR</text><text x="294" y="151" class="card-title">OCR</text><text x="294" y="176" class="small">Extract text from media</text>
    <rect x="20" y="230" width="180" height="84" class="card"/><text x="38" y="264" class="icon">ASR</text><text x="92" y="257" class="card-title">ASR</text><text x="92" y="282" class="small">Transcribe audio/video</text>
    <rect x="220" y="230" width="180" height="84" class="card"/><text x="238" y="264" class="icon">VLM</text><text x="294" y="257" class="card-title">Image / VLM</text><text x="294" y="282" class="small">Objects / style / artifacts</text>
    <rect x="20" y="336" width="180" height="84" class="card"/><text x="38" y="370" class="icon">VID</text><text x="92" y="363" class="card-title">Video Analyzer</text><text x="92" y="388" class="small">Duration / frames / consistency</text>
    <rect x="220" y="336" width="180" height="84" class="card"/><text x="238" y="370" class="icon">SAFE</text><text x="306" y="363" class="card-title">Safety</text><text x="306" y="388" class="small">Compliance / risk</text>
    <rect x="20" y="442" width="180" height="66" class="card"/><text x="38" y="481" class="icon">RAG</text><text x="92" y="474" class="card-title">Retriever</text>
    <rect x="220" y="442" width="180" height="66" class="card"/><text x="238" y="481" class="icon">WEB</text><text x="294" y="474" class="card-title">Search</text>
    <rect x="20" y="526" width="380" height="34" class="card"/><text x="84" y="549" class="icon">STRUCTURED EVIDENCE</text>
  </g>

  <g transform="translate(1174 126)">
    <rect width="300" height="575" class="lane-green"/>
    <rect width="300" height="54" rx="16" class="head-green"/>
    <text x="150" y="36" text-anchor="middle" class="head-text">4. Judge / Scoring Layer</text>
    <rect x="22" y="86" width="256" height="106" class="card-green"/><text x="42" y="126" class="icon-green">RULES</text><text x="42" y="154" class="card-text">Hard constraint validation</text><text x="42" y="176" class="small">duration / text / format / safety</text>
    <rect x="22" y="235" width="256" height="145" class="card-green"/><text x="42" y="275" class="icon-green">JUDGE</text><text x="42" y="303" class="card-text">Score based on rubric + evidence</text><text x="42" y="328" class="small">intent alignment / quality</text><text x="42" y="350" class="small">completeness / acceptability</text>
    <rect x="22" y="424" width="256" height="106" class="card-green"/><text x="42" y="464" class="icon-green">RESULT</text><text x="42" y="492" class="card-text">Pass/fail + score + failures</text><text x="42" y="514" class="small">explanation + recommendation</text>
  </g>

  <g transform="translate(1518 126)">
    <rect width="250" height="575" class="lane"/>
    <rect width="250" height="54" rx="16" class="head"/>
    <text x="125" y="36" text-anchor="middle" class="head-text">5. Storage & Analysis</text>
    <rect x="18" y="100" width="214" height="94" class="card"/><text x="38" y="138" class="icon">STORE</text><text x="38" y="166" class="card-text">JSON / traces / evidence</text>
    <rect x="18" y="248" width="214" height="112" class="card"/><text x="38" y="286" class="icon">DASH</text><text x="38" y="314" class="card-text">Version comparison</text><text x="38" y="338" class="small">regression / slice analysis</text>
    <rect x="18" y="414" width="214" height="112" class="card"/><text x="38" y="452" class="icon">TRACK</text><text x="38" y="480" class="card-text">Model / prompt / agent</text><text x="38" y="504" class="small">version management</text>
  </g>

  <path class="arrow" d="M304 414 H345"/><path class="arrow" d="M655 414 H699"/><path class="arrow" d="M1124 414 H1169"/><path class="arrow-green" d="M1474 414 H1513"/>

  <g transform="translate(255 765)">
    <rect width="1010" height="150" class="card-purple"/>
    <rect x="330" y="-36" width="350" height="52" rx="14" class="head-purple"/>
    <text x="505" y="-2" text-anchor="middle" class="head-text">6. Continuous Improvement Loop</text>
    <rect x="36" y="42" width="280" height="74" class="card-purple"/><text x="56" y="76" class="icon-purple">HUMAN</text><text x="56" y="102" class="card-text">review / labeling / calibration</text>
    <rect x="365" y="42" width="280" height="74" class="card-purple"/><text x="385" y="76" class="icon-purple">SIGNALS</text><text x="385" y="102" class="card-text">regenerate / save / edit / report</text>
    <rect x="694" y="42" width="280" height="74" class="card-purple"/><text x="714" y="76" class="icon-purple">UPDATE</text><text x="714" y="102" class="card-text">dataset / rubric / thresholds</text>
  </g>
  <path class="loop" d="M1265 840 C1450 840 1325 700 1325 704"/>
  <path class="loop" d="M255 840 C110 840 170 704 170 704"/>

  <g transform="translate(1325 770)">
    <rect width="420" height="130" class="note"/>
    <text x="26" y="40" class="note-title">Key Idea</text>
    <text x="26" y="72" class="note-text">Do not let the LLM score by intuition alone.</text>
    <text x="26" y="100" class="note-text">Extract evidence, then evaluate with a rubric.</text>
  </g>
</svg>
